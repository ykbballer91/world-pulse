name: Daily World Pulse

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-world-pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check DATABASE_URL secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set"
            exit 1
          fi
          echo "DATABASE_URL is set"

      - name: Run daily build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/run_daily_world_pulse.py --days 30

      - name: Verify generated outputs
        run: |
          test -f public/display/latest.json
          test -f public/share/world-pulse-latest.png
          test -f public/share/world-pulse-latest.jpg
          test -f public/share/world-pulse-latest.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/display/latest.json public/share/world-pulse-latest.png public/share/world-pulse-latest.jpg public/share/world-pulse-latest.txt
          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
          else
            git commit -m "chore: update daily World Pulse output"
            git push
          fi
